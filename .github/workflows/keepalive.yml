# Evita que Supabase free tier pause el proyecto por inactividad (~1 semana).
# Configura los secrets SUPABASE_URL y SUPABASE_ANON_KEY en GitHub > Settings > Secrets.
name: Supabase keep-alive
on:
  schedule:
    - cron: '0 8 */3 * *' # cada 3 días
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST API
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/households?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" > /dev/null
